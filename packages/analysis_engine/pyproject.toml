[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "analysis-engine"
version = "0.1.0"
description = "Deterministic data analysis engine for personal insights."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0.0",
    "pandas>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "ruff>=0.4.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/analysis_engine"]

[tool.uv]
package = true

[tool.ruff.lint]
ignore = ["E501"]
