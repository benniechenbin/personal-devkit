[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "provider-engine"
version = "0.1.0"
description = "Reusable provider adapters for LLM, embedding, reranking, routing, retry, and structured output."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
openai = [
    "openai>=1.0.0",
]
dev = [
    "pytest>=8.0.0",
    "ruff>=0.4.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/provider_engine"]

[tool.uv]
package = true
