[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "core-utils"
version = "0.1.0"
description = "Shared low-level utilities for personal-devkit packages."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2",
]

[tool.hatch.build.targets.wheel]
packages = ["src/core_utils"]

[tool.uv]
package = true
