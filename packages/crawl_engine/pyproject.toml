[project]
name = "crawl-engine"
version = "0.1.0"
description = "A versatile web crawling engine supporting both lightweight HTTPX fetching and advanced Crawl4AI-powered scraping with JS rendering and noise removal."
readme = "README.md"
requires-python = ">=3.11"
keywords = ["crawler", "scraping", "crawl4ai", "httpx", "automation"]
dependencies = [
    "httpx>=0.28",
    "pydantic>=2",
    "tenacity>=9",
]

[project.optional-dependencies]
crawl4ai = [
    "crawl4ai>=0.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/crawl_engine"]
