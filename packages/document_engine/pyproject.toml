[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "document-engine"
version = "0.2.0"
description = "Reusable document parsing engines and PDF-to-Markdown building blocks."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pymupdf>=1.27.2.3",
    "openpyxl>=3.1.0",
    "tabulate>=0.9.0",
    "python-docx>=1.1.0",
]

[project.optional-dependencies]
tabular = [
    "pandas>=2.0.0",
]
formula = [
    "pix2text>=1.1.6",
]
vision = [
    "paddleocr>=2.7.0,<3.0.0",
]
all = [
    "pix2text>=1.1.6",
    "paddleocr>=2.7.0,<3.0.0",
]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=5.0.0",
    "ruff>=0.4.0",
    "mypy>=1.10.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/document_engine"]

[tool.uv]
package = true
