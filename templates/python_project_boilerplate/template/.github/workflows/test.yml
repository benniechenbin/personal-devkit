name: CI Pipeline

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan
        uses: trufflesecurity/trufflehog@v3.95.5
        with:
          extra_args: --results=verified,unknown

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Check lock file
        run: make lock

      - name: Install dependencies
        run: uv sync --locked --extra dev

      - name: Run checks
        run: make check

      - name: Check env example
        run: make check-env-example

      - name: Run tests
        run: make test

      - name: Build Docker image
        run: docker build -t python-project:ci .

      - name: Smoke test Docker image
        run: docker run --rm -e APP_ENV=test -e LOG_DIR=/tmp/app-logs python-project:ci
