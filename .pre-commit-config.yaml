repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-toml
      - id: check-yaml
      - id: check-added-large-files
      - id: detect-private-key
      - id: check-merge-conflict
        args: [--assume-in-merge]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        additional_dependencies:
          - langchain-core
          - langchain-openai
          - langgraph
          - loguru
          - pydantic
          - pydantic-settings
        args:
          - --ignore-missing-imports
          - --check-untyped-defs
          - --warn-unused-ignores
          - --warn-unreachable
        files: ^(templates/(agent_enterprise_boilerplate|python_project_boilerplate)/src/|templates/_shared/).+\.py$
