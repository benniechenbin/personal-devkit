name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check lock file
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --all-packages --all-extras --group dev --frozen

      - name: Check shared template sync
        run: make sync-shared

      - name: Check env examples
        run: make check-env-example

      - name: Lint
        run: make lint

      - name: Format check
        run: make format

      - name: Type check
        run: |
          make type
          make type-retrieval

      - name: Check package boundaries
        run: make boundary-check

      - name: Test
        run: make test

      - name: Check package coverage
        run: make coverage-check

      - name: Check Copier template
        run: uv run python templates/python_project_boilerplate/scripts/check_copier_template.py
