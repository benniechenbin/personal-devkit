name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check lock file
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --all-packages --all-extras --group dev --frozen

      - name: Check shared template sync
        run: uv run python templates/_shared/sync_shared.py --check

      - name: Check env examples
        run: |
          cd templates/python_project_boilerplate && uv run python scripts/generate_env_example.py --check
          cd ../../templates/agent_enterprise_boilerplate && uv run python scripts/generate_env_example.py --check

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format . --check

      - name: Type check
        run: uv run mypy templates/agent_enterprise_boilerplate/src templates/python_project_boilerplate/src templates/_shared

      - name: Test
        run: uv run pytest

      - name: Check Copier template
        run: uv run python templates/python_project_boilerplate/scripts/check_copier_template.py
